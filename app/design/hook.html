<!-- PARA-CODE: fork-owned file (Para Code) — not present in upstream microsoft/vscode. See CLAUDE.md. -->
<!doctype html>
<html lang="ja">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Para Code Agent Activity</title>
<style>
:root{color-scheme:dark;--bg:#050506;--surface:#131316;--surface2:#1c1c20;--surface3:#232328;--border:rgba(255,255,255,.08);--text:#f0f0f2;--dim:#8a8a92;--accent:#09afd9;--green:#4fd1a5;--yellow:#e0c07d;--red:#f47272;--purple:#c193d9}*{box-sizing:border-box}body{margin:0;background:#0d0d10;color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;display:grid;grid-template-columns:240px 1fr;min-height:100vh}.controls{padding:28px 20px;border-right:1px solid var(--border)}h1{font-size:17px;margin:0 0 6px}.note{font-size:11px;color:var(--dim);line-height:1.5;margin-bottom:20px}.controls button{width:100%;border:1px solid var(--border);background:var(--surface);color:var(--text);border-radius:10px;padding:10px;margin:0 0 8px;text-align:left;cursor:pointer}.controls button.active{border-color:var(--accent);background:rgba(9,175,217,.14)}main{display:grid;place-items:center;padding:30px}.phone{width:390px;height:844px;background:var(--bg);border:1px solid rgba(255,255,255,.14);border-radius:42px;overflow:hidden;box-shadow:0 28px 90px #000}.status{height:38px;padding:14px 25px 0;font-size:11px;display:flex;justify-content:space-between}.nav{height:58px;padding:6px 13px 9px;display:flex;align-items:center;gap:11px;background:rgba(19,19,22,.88);border-bottom:1px solid var(--border)}.round{width:36px;height:36px;border-radius:19px;background:var(--surface3);display:grid;place-items:center;font-size:21px}.title{flex:1}.title b{display:block;font-size:17px}.title small{display:block;color:var(--dim);font:10px Menlo,monospace}.chat{height:650px;padding:16px 14px;overflow:auto;font-size:13px;line-height:1.48}.user{margin-left:auto;max-width:86%;width:max-content;background:var(--surface2);border-radius:16px 16px 5px 16px;padding:9px 12px}.answer{margin-top:17px}.activity{margin:12px 3px;color:var(--dim);font-size:11px}.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:11px;margin:12px 0}.head,.row,.task{display:flex;align-items:center;gap:8px}.head{font-size:11px;font-weight:650}.dot{width:7px;height:7px;border-radius:50%;background:var(--accent)}.count{margin-left:auto;color:var(--dim)}.row{border-top:1px solid var(--border);padding-top:9px;margin-top:9px}.avatar{width:24px;height:24px;border-radius:7px;background:rgba(9,175,217,.14);color:var(--accent);display:grid;place-items:center;font-size:9px}.body{flex:1;min-width:0}.body b{display:block;font-size:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.body small{display:block;color:var(--dim);font:8px Menlo,monospace}.pill{font-size:8px;padding:3px 7px;border-radius:10px}.tasks{border-top:1px solid var(--border);margin-top:9px;padding-top:8px}.tasks>small{color:var(--dim)}.task{font-size:9px;margin-top:6px}.compact{display:flex;gap:7px;align-items:center;background:rgba(193,147,217,.1);border:1px solid rgba(193,147,217,.2);color:var(--purple);border-radius:9px;padding:8px 9px;font-size:9px}.summary{border-left:1px solid var(--border);padding:7px 10px;color:var(--dim);font-size:10px}.composer{height:72px;margin:0 12px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:21px;padding:13px;color:var(--dim);font-size:11px}.failure{color:var(--red)}@media(max-width:700px){body{grid-template-columns:1fr}.controls{border-right:0;border-bottom:1px solid var(--border)}main{padding:16px}.phone{width:min(390px,100%);height:760px}.chat{height:566px}}
</style></head>
<body><aside class="controls"><h1>Agent Activity</h1><p class="note">現行Para Codeのエージェント詳細画面にA1案を統合した状態モックです。</p><button data-state="running">実行中</button><button data-state="partial">一部完了</button><button data-state="idle">Teammate待機</button><button data-state="failed">失敗・中断</button><button data-state="complete">全完了（A1）</button></aside>
<main><div class="phone"><div class="status"><span>9:41</span><span>●●●</span></div><div class="nav"><span class="round">‹</span><div class="title"><b>Terminal 1</b><small><span style="color:var(--accent)">para-code</span> · main</small></div><span class="round">◎</span></div><div class="chat"><div class="user">全hooksに対応して</div><div class="answer">ClaudeとCodexのイベントを共通モデルへ統合しています。</div><div class="activity">› 思考 ・ ツール3件 (Read, Bash)</div><div id="activity"></div><div class="answer">既存のチャット表示を維持したまま進行状況を同期します。</div></div><div class="composer">＋　エージェントへメッセージ…</div></div></main>
<script>
const states={running:{agents:[['hook登録を更新','SubAgent','実行中','running'],['Codexイベントを調査','SubAgent','実行中','running']],tasks:[['hook一覧を更新',0],['payloadを転送',0]],compact:1},partial:{agents:[['hook登録を更新','SubAgent','完了','done'],['モバイル型を更新','SubAgent','実行中','running']],tasks:[['hook一覧を更新',1],['payloadを転送',0],['UIを統合',0]],compact:1},idle:{agents:[['researcher','teammate','待機中','idle'],['UIを実装','SubAgent','実行中','running']],tasks:[['Codexパターンを調査',1],['リグレッション確認',0]],compact:0},failed:{agents:[['hook登録を更新','SubAgent','完了','done'],['Codex調査','SubAgent','失敗','failed'],['UI確認','SubAgent','中断','idle']],tasks:[['hook一覧を更新',1],['payloadを転送',0]],compact:1},complete:{complete:true,summary:'エージェント3件・タスク4件が完了',compact:1}};
function render(name){document.querySelectorAll('button').forEach(b=>b.classList.toggle('active',b.dataset.state===name));const s=states[name],el=document.querySelector('#activity');if(s.complete){el.innerHTML=`<div class="summary">✓ ${s.summary} · 1分24秒</div>${s.compact?'<div class="compact">◇ コンテキストを圧縮しました · 12:42</div>':''}`;return}const active=s.agents.filter(a=>a[2]==='実行中').length;el.innerHTML=`<div class="card"><div class="head"><span class="dot"></span>実行中のエージェント <span class="count">${active}</span></div>${s.agents.map(a=>`<div class="row"><span class="avatar">${a[1]==='teammate'?'T':'A'}</span><span class="body"><b>${a[0]}</b><small>${a[1]}</small></span><span class="pill ${a[3]==='failed'?'failure':''}" style="background:${a[3]==='running'?'rgba(9,175,217,.12)':a[3]==='failed'?'rgba(244,114,114,.1)':'rgba(79,209,165,.1)'}">${a[2]}</span></div>`).join('')}<div class="tasks"><small>タスク ${s.tasks.filter(t=>t[1]).length} / ${s.tasks.length}</small>${s.tasks.map(t=>`<div class="task"><span style="color:${t[1]?'var(--green)':'var(--accent)'}">${t[1]?'✓':'◉'}</span>${t[0]}</div>`).join('')}</div></div>${s.compact?'<div class="compact">◇ コンテキストを圧縮しました · 12:42</div>':''}`}
document.querySelectorAll('button').forEach(b=>b.onclick=()=>render(b.dataset.state));render('running');
</script></body></html>
