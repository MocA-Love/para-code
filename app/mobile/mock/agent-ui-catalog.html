<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Paracode Mobile — Agent UI Catalog</title>
<style>
:root{--bg:#050506;--panel:#131316;--surface:#131316;--surface2:#1c1c20;--surface3:#232328;--border:rgba(255,255,255,.08);--strong:rgba(255,255,255,.16);--text:#f0f0f2;--dim:#8a8a92;--accent:#09afd9;--accent2:#0598bd;--wash:rgba(9,175,217,.14);--green:#4fd1a5;--yellow:#e0c07d;--red:#f47272;--purple:#c193d9;--claude:#d97757;--glass:rgba(28,28,32,.72)}
*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:radial-gradient(circle at 20% 0,#162126 0,transparent 32%),#09090b;color:var(--text);font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}button,select{font:inherit}button{cursor:pointer}.app{min-height:100vh;display:grid;grid-template-columns:minmax(430px,1fr) 380px}.stage{min-height:100vh;display:grid;place-items:center;padding:48px;position:sticky;top:0}.studio{border-left:1px solid var(--border);background:rgba(13,13,16,.92);padding:26px 22px;overflow:auto;height:100vh}.brand{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}.brand h1{font-size:17px;margin:0}.brand small{color:var(--dim)}.group{border-top:1px solid var(--border);padding:17px 0}.group-title{font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:var(--dim);font-weight:800;margin-bottom:9px}.seg{display:grid;grid-template-columns:repeat(2,1fr);gap:6px}.seg.three{grid-template-columns:repeat(3,1fr)}.seg button,.preset,.action{min-height:36px;border:1px solid var(--border);background:var(--surface2);color:var(--dim);border-radius:10px;padding:7px 9px;font-size:11px}.seg button.active{border-color:rgba(9,175,217,.55);color:var(--text);background:var(--wash)}.preset{width:100%;text-align:left;margin:3px 0}.preset b{display:block;color:var(--text);font-size:11px}.preset span{font-size:9px}.action{color:var(--text);width:100%;background:var(--accent2);border-color:transparent;font-weight:700}.action.secondary{background:var(--surface2);border-color:var(--strong)}.note{color:var(--dim);font-size:9px;line-height:1.5;margin:8px 0 0}.phone-shell{width:390px;height:844px;border-radius:50px;background:#000;padding:9px;box-shadow:0 28px 90px #000,0 0 0 1px #ffffff24;position:relative}.phone{height:100%;border-radius:42px;overflow:hidden;background:var(--bg);position:relative}.island{position:absolute;z-index:20;top:10px;left:50%;transform:translateX(-50%);width:116px;height:31px;border-radius:20px;background:#000}.statusbar{position:absolute;z-index:19;top:0;left:0;right:0;height:52px;padding:16px 25px 0;font-size:11px;font-weight:700;display:flex;justify-content:space-between;pointer-events:none}.screen{height:100%;display:flex;flex-direction:column;padding-top:52px}.header{height:65px;display:flex;align-items:center;gap:10px;padding:8px 13px;border-bottom:1px solid var(--border);background:rgba(5,5,6,.88);backdrop-filter:blur(20px);flex:none}.round{width:38px;height:38px;border-radius:50%;border:1px solid var(--strong);background:var(--glass);color:var(--text);display:grid;place-items:center}.header-copy{min-width:0;flex:1}.header-copy strong{font-size:14px;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.sub{font:9px Menlo,monospace;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.content{flex:1;overflow:auto;padding:12px 14px 104px;scrollbar-width:none}.content::-webkit-scrollbar{display:none}.activity-strip{margin:7px 12px 0;border:1px solid rgba(193,147,217,.27);background:rgba(193,147,217,.09);border-radius:14px;padding:9px 10px;display:flex;gap:7px;align-items:center;flex:none}.pulse{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 0 4px rgba(79,209,165,.12)}.strip-copy{flex:1;min-width:0}.strip-title{font-size:10px;font-weight:700}.strip-sub{font-size:8px;color:var(--dim);margin-top:2px}.bubble{max-width:88%;border-radius:15px;padding:10px 11px;margin:7px 0;font-size:11px;line-height:1.5;background:var(--surface);border:1px solid var(--border)}.bubble.user{margin-left:auto;background:var(--wash);border-color:rgba(9,175,217,.18)}.activity-line{display:flex;align-items:center;gap:6px;color:var(--dim);font-size:9px;padding:7px 2px}.composer{position:absolute;bottom:0;left:0;right:0;padding:10px 12px 25px;background:linear-gradient(transparent,var(--bg) 32%)}.composer-box{height:52px;border-radius:18px;border:1px solid var(--strong);background:rgba(28,28,32,.9);display:flex;align-items:center;padding:8px 9px;gap:8px;color:var(--dim);font-size:11px}.send{margin-left:auto;width:32px;height:32px;border-radius:50%;background:var(--accent2);display:grid;place-items:center;color:white}.web{border:1px solid rgba(9,175,217,.2);background:rgba(9,175,217,.07);border-radius:14px;padding:10px;margin:7px 0}.web-head{display:flex;align-items:center;gap:9px}.fav-stack{display:flex;padding-right:4px}.favicon{width:24px;height:24px;border-radius:8px;margin-right:-6px;border:1px solid var(--border);background:var(--surface2);display:grid;place-items:center;font-size:9px;font-weight:800;overflow:hidden}.favicon img{width:15px;height:15px}.web-copy{flex:1}.eyebrow{font-size:8px;text-transform:uppercase;letter-spacing:.08em;font-weight:800;color:var(--accent)}.web-query{font-size:10px;margin-top:2px}.web-body{border-left:1px solid var(--border);margin:9px 0 0 10px;padding:3px 0 0 12px;color:var(--dim);font-size:9px}.domain{display:flex;align-items:center;gap:9px;margin:6px 0}.consent{border:0;background:transparent;color:var(--accent);padding:5px 0;font-size:9px}.question,.approval{border:1px solid var(--accent);background:rgba(9,175,217,.1);border-radius:16px;padding:12px;margin:8px 0}.approval{border-color:var(--yellow);background:rgba(224,192,125,.1)}.card-head{font-size:10px;font-weight:700;display:flex;gap:6px;align-items:center}.chip{font-size:8px;background:var(--surface2);padding:3px 6px;border-radius:6px}.question-text{font-size:11px;font-weight:650;margin:10px 0}.option{border:1px solid var(--border);background:var(--surface2);border-radius:11px;padding:8px 9px;margin:6px 0;font-size:10px}.option.selected{border-color:var(--accent);background:var(--wash)}.approval-actions{display:flex;gap:8px;margin-top:10px}.approval-actions button{flex:1;border-radius:10px;padding:9px;border:0;font-weight:700;font-size:10px}.allow{background:var(--green);color:var(--bg)}.deny{background:var(--surface2);color:var(--red)}.overview{display:flex;justify-content:space-around;border:1px solid var(--border);border-radius:16px;background:var(--surface);padding:14px;margin-bottom:18px}.metric{text-align:center}.metric b{font-size:20px;display:block}.metric span{font-size:8px;color:var(--dim)}.section-title{font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--dim);font-weight:800;margin:14px 0 8px}.agent-row,.task-row{display:flex;align-items:center;gap:9px;padding:10px;margin:7px 0;border:1px solid var(--border);border-radius:14px;background:var(--surface)}.avatar{width:32px;height:32px;border-radius:10px;display:grid;place-items:center;font-size:10px;font-weight:900;background:var(--wash);color:var(--accent)}.avatar.claude{background:rgba(217,119,87,.15);color:var(--claude)}.row-main{flex:1;min-width:0}.row-main b{font-size:11px;display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.row-main span{font:8px Menlo,monospace;color:var(--dim)}.badge{font-size:8px;font-weight:800;border-radius:8px;padding:4px 6px}.running{color:var(--accent);background:rgba(9,175,217,.12)}.idle,.unknown,.interrupted{color:var(--yellow);background:rgba(224,192,125,.12)}.completed{color:var(--green);background:rgba(79,209,165,.12)}.failed{color:var(--red);background:rgba(244,114,114,.12)}.meta{border:1px solid rgba(193,147,217,.27);background:rgba(193,147,217,.08);border-radius:16px;padding:12px}.meta-label{font-size:7px;color:var(--dim);text-transform:uppercase;font-weight:800;margin-top:8px}.meta-value{font-size:10px;line-height:1.5;margin-top:3px}.code{font:8px Menlo,monospace;color:var(--purple)}.message{border:1px solid var(--border);background:var(--surface);padding:9px;border-radius:12px;margin:7px 0}.message.tool{background:var(--surface2)}.message .role{font-size:7px;color:var(--dim);font-weight:800;text-transform:uppercase}.message p{font-size:9px;line-height:1.5;margin:4px 0 0}.gate{height:100%;display:grid;place-items:center;text-align:center;padding:40px}.gate .cloud{font-size:40px;color:var(--dim)}.gate h2{font-size:17px;margin:12px 0 5px}.gate p{font-size:11px;line-height:1.6;color:var(--dim)}.gate button{border:0;background:var(--accent2);color:white;border-radius:10px;padding:10px 22px;font-weight:700}.gate-back{position:absolute;top:62px;left:16px;border:1px solid var(--border)!important;background:var(--surface)!important;padding:8px 11px!important}.session-error{display:grid;place-items:center;text-align:center;min-height:520px;color:var(--dim);font-size:11px}.session-error b{color:var(--text);font-size:14px}.gallery{position:fixed;inset:0;z-index:100;background:rgba(5,5,6,.96);padding:28px;overflow:auto;display:none}.gallery.show{display:block}.gallery-top{display:flex;justify-content:space-between;align-items:center}.gallery-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:18px;margin-top:20px}.mini{border:1px solid var(--border);background:var(--panel);border-radius:20px;padding:12px;min-height:270px}.mini h3{font-size:11px}.mini-phone{height:215px;background:var(--bg);border-radius:16px;padding:10px;font-size:8px;overflow:hidden}.close{border:1px solid var(--strong);background:var(--surface2);color:var(--text);border-radius:10px;padding:8px 12px}
@media(max-width:900px){.app{display:flex;flex-direction:column}.studio{order:-1;height:auto;border-left:0;border-bottom:1px solid var(--border)}.stage{position:static;padding:30px 12px}.phone-shell{transform-origin:top center;max-width:calc(100vw - 24px)}}
.activity-strip,button.agent-row{color:var(--text)}button.agent-row{width:100%;text-align:left}
</style>
</head>
<body>
<main class="app">
  <section class="stage"><div class="phone-shell"><div class="phone"><div class="island"></div><div class="statusbar"><span>9:41</span><span>● 5G ▰</span></div><div id="phone"></div></div></div></section>
  <aside class="studio">
    <div class="brand"><div><h1>Agent UI Catalog</h1><small>Current implementation · localhost</small></div><button class="close" id="galleryOpen">全パターン</button></div>
    <div class="group"><div class="group-title">Provider</div><div class="seg" data-control="provider"><button data-value="claude">Claude Code</button><button data-value="codex">Codex</button></div></div>
    <div class="group"><div class="group-title">Screen</div><div class="seg three" data-control="screen"><button data-value="agent">親Agent</button><button data-value="activity">Activity</button><button data-value="detail">SubAgent詳細</button></div></div>
    <div class="group"><div class="group-title">Activity</div><div class="seg three" data-control="activity"><button data-value="none">なし</button><button data-value="single">1件実行</button><button data-value="parallel">複数並列</button><button data-value="completed">完了</button><button data-value="failed">失敗</button><button data-value="unknown">状態不明</button></div></div>
    <div class="group"><div class="group-title">Web Search</div><div class="seg three" data-control="web"><button data-value="none">なし</button><button data-value="searching">検索中</button><button data-value="complete">完了</button><button data-value="domains">参照サイト</button><button data-value="failed">失敗</button><button data-value="expanded">展開</button></div><p class="note">faviconは「サイトアイコンを表示」を押すまで外部取得しません。</p></div>
    <div class="group"><div class="group-title">Interaction</div><div class="seg three" data-control="interaction"><button data-value="none">なし</button><button data-value="question">質問</button><button data-value="questionGroup">複数質問</button><button data-value="approval">承認</button><button data-value="submitting">送信中</button></div></div>
    <div class="group"><div class="group-title">Environment</div><div class="seg three" data-control="environment"><button data-value="normal">通常</button><button data-value="long">長履歴</button><button data-value="offline">切断</button><button data-value="connecting">接続中</button><button data-value="unpaired">未ペアリング</button><button data-value="agentLoading">Agent読込</button><button data-value="agentMissing">Sessionなし</button><button data-value="detailLoading">詳細読込</button><button data-value="detailError">詳細失敗</button><button data-value="sessionChanged">親切替</button></div></div>
    <div class="group"><div class="group-title">Model / Settings</div><div class="seg three" data-control="settings"><button data-value="normal">通常</button><button data-value="loading">読込中</button><button data-value="updating">更新中</button><button data-value="error">エラー</button></div></div>
    <div class="group"><div class="group-title">Presets</div><button class="preset" data-preset="claudeParallel"><b>Claude · 並列SubAgent</b><span>親画面ヘッダー直下の実行中一覧</span></button><button class="preset" data-preset="codexWeb"><b>Codex · Web検索完了</b><span>参照domainと明示favicon取得</span></button><button class="preset" data-preset="childDetail"><b>SubAgent専用画面</b><span>親子識別、Prompt、Task、履歴</span></button><button class="preset" data-preset="questions"><b>複数質問</b><span>段階式カードと一括送信</span></button></div>
    <button class="action secondary" id="reset">初期状態へ戻す</button>
  </aside>
</main>
<section class="gallery" id="gallery" role="dialog" aria-modal="true" aria-labelledby="galleryTitle"><div class="gallery-top"><div><h2 id="galleryTitle">主要パターン一覧</h2><p class="note">クリックするとStudioへ読み込みます。</p></div><button class="close" id="galleryClose">閉じる</button></div><div class="gallery-grid" id="galleryGrid"></div></section>
<script>
const initialState={provider:'claude',screen:'agent',activity:'parallel',web:'none',webExpanded:false,interaction:'none',interactionSubmitting:false,composerSubmitting:false,environment:'normal',settings:'normal',remoteFavicons:false,questionStep:0,selectedOption:0,groupAnswers:[0,0],draft:'',sentMessages:[]};const state={...initialState,groupAnswers:[...initialState.groupAnswers],sentMessages:[]};
Object.defineProperty(state,'submitting',{get(){return state.interactionSubmitting},set(value){state.interactionSubmitting=value}});
let composerGeneration=0;
const labels={running:'実行中',idle:'待機中',completed:'完了',failed:'失敗',interrupted:'中断',unknown:'状態不明'};
const presets={
 claudeParallel:{provider:'claude',screen:'agent',activity:'parallel',web:'none',interaction:'none',environment:'normal'},
 codexWeb:{provider:'codex',screen:'agent',activity:'completed',web:'domains',webExpanded:true,interaction:'none',environment:'normal'},
 childDetail:{provider:'claude',screen:'detail',activity:'completed',web:'none',interaction:'none',environment:'normal'},
 questions:{provider:'claude',screen:'agent',activity:'none',web:'none',interaction:'questionGroup',environment:'normal'},
 offline:{provider:'codex',screen:'detail',activity:'parallel',web:'none',interaction:'none',environment:'offline'},
 failed:{provider:'codex',screen:'activity',activity:'failed',web:'failed',interaction:'none',environment:'normal'}
};
const agents=()=>{
 const base=state.provider==='claude'?[
  {id:'a1',label:'Explore',provider:'claude',status:'running',detail:'モバイルAgent UIの既存実装を調査する',time:'1分24秒'},
  {id:'a2',label:'general-purpose',provider:'claude',status:'idle',detail:'Web Search表示の状態を確認する',time:'48秒'},
  {id:'teammate:reviewer',label:'reviewer',provider:'claude',role:'teammate',status:'idle',time:'2分03秒'}
 ]:[
  {id:'thread-7b2',label:'UI implementation review',provider:'codex',status:'running',detail:'Review the mobile activity implementation',time:'1分08秒'},
  {id:'thread-8cd',label:'Protocol audit',provider:'codex',status:'completed',detail:'Check protocol and stale session behavior',time:'2分17秒'}
 ];
 if(state.environment==='long')return Array.from({length:100},(_,i)=>({...base[i%base.length],id:`${base[i%base.length].id}-${i}`,label:`${base[i%base.length].label} ${i+1}`,status:i<3?'running':i%11===0?'failed':'completed',time:`${i+1}分` }));
 if(state.activity==='single')return [base[0]];
 if(state.activity==='parallel')return base;
 if(state.activity==='completed')return base.slice(0,2).map(a=>({...a,status:'completed'}));
 if(state.activity==='failed')return base.slice(0,2).map((a,i)=>({...a,status:i?'interrupted':'failed'}));
 if(state.activity==='unknown')return base.slice(0,2).map(a=>({...a,status:'unknown'}));
 return [];
};
const tasks=()=>state.activity==='none'?[]:[
 {id:'t1',label:'モバイルUIを調査',detail:'現行画面の構造と状態を確認',assignee:agents()[0]?.label,status:state.activity==='completed'?'completed':state.activity==='failed'?'failed':'running'},
 {id:'t2',label:'Web Searchを確認',detail:'検索中・完了・失敗を比較',assignee:agents()[1]?.label,status:state.activity==='completed'?'completed':'running'}
];
function badge(status){return `<span class="badge ${status}">${labels[status]}</span>`}
function header(title,sub,back=true,showBrowser=false){return `<div class="header">${back?'<button class="round" data-nav="back" aria-label="戻る">‹</button>':''}<div class="header-copy"><strong>${title}</strong><div class="sub">${sub}</div></div>${showBrowser?'<button class="round" aria-label="ブラウザ">◎</button>':''}</div>`}
function activityStrip(){const active=agents().filter(a=>['running','idle'].includes(a.status));if(!active.length||state.screen!=='agent')return'';return `<button class="activity-strip" data-nav="activity"><span class="pulse"></span><span class="strip-copy"><span class="strip-title">${active.length}件のSubAgent / Taskが実行中</span><span class="strip-sub">${active.slice(0,2).map(a=>a.label).join(' · ')}${active.length>2?' ほか':''}</span></span><span>›</span></button>`}
function favicon(domain,remote=state.remoteFavicons){return `<span class="favicon">${remote?`<img alt="" src="https://www.google.com/s2/favicons?sz=64&domain_url=${encodeURIComponent('https://'+domain)}">`:domain[0].toUpperCase()}</span>`}
function webCard(){if(state.web==='none')return'';const failed=state.web==='failed',searching=state.web==='searching',domains=['openai.com','docs.anthropic.com','github.com'];const hasDomains=['domains','complete'].includes(state.web);return `<div class="web"><button class="web-head" id="webToggle" aria-expanded="${state.webExpanded}" style="width:100%;border:0;background:transparent;color:inherit;text-align:left;padding:0"><div class="fav-stack">${hasDomains?domains.map(d=>favicon(d)).join(''):'<span class="favicon">⌕</span>'}</div><div class="web-copy"><div class="eyebrow" style="${failed?'color:var(--red)':''}">${failed?'Web検索失敗':searching?'Webを検索中':hasDomains?'3サイトを参照':'Web検索完了'}</div><div class="web-query">Claude Code Codex mobile SubAgent UI</div></div><span>${state.webExpanded?'⌄':'›'}</span></button>${state.webExpanded?`<div class="web-body"><div>Tool: web_search</div><div>${failed?'Web検索に失敗しました':searching?'検索結果を待っています':'検索結果を正規化しました'}</div>${hasDomains&&!state.remoteFavicons?'<button class="consent" id="favConsent">サイトアイコンを表示（ドメイン名をGoogleへ送信）</button>':''}${hasDomains?domains.map(d=>`<div class="domain">${favicon(d)}<span>${d}</span></div>`).join(''):''}</div>`:''}</div>`}
function interaction(){if(state.interaction==='none')return'';if(state.interaction==='approval')return `<div class="approval" style="${state.submitting?'opacity:.65':''}"><div class="card-head">⚠ エージェントが確認を求めています${state.submitting?'<span style="margin-left:auto;color:var(--dim)">送信中</span>':''}</div><div class="question-text code">Bash: pnpm --dir app/mobile typecheck</div><div class="approval-actions"><button class="allow" ${state.submitting?'disabled':''}>許可</button><button class="deny" ${state.submitting?'disabled':''}>拒否</button></div><p class="note">選択肢が複数ある場合はターミナルタブで確認できます</p></div>`;
 const group=state.interaction==='questionGroup';if(group){const selected=state.groupAnswers[state.questionStep];return `<div class="question" style="${state.submitting?'opacity:.65':''}"><div class="card-head">? <span class="chip">複数の質問（全2問）</span>${state.submitting?'<span style="margin-left:auto;color:var(--dim)">送信中</span>':''}</div><div style="display:flex;gap:6px;margin:9px 0"><button class="chip" data-step="0" aria-selected="${state.questionStep===0}">${state.questionStep===0?'● ':''}✓ UI範囲</button><button class="chip" data-step="1" aria-selected="${state.questionStep===1}">${state.questionStep===1?'● ':''}✓ 表示方法</button></div><div class="question-text">${state.questionStep?'どの表示方法を優先しますか？':'どの範囲を確認しますか？'}</div><button class="option ${selected===0?'selected':''}" data-option="0" aria-pressed="${selected===0}" style="width:100%;color:inherit;text-align:left">1. 現行実装のみ</button><button class="option ${selected===1?'selected':''}" data-option="1" aria-pressed="${selected===1}" style="width:100%;color:inherit;text-align:left">2. 改善案も含める</button><button class="action" id="questionSubmit" ${state.submitting?'disabled':''} style="margin-top:8px">回答を送信（2/2）</button><p class="note">すべての質問に回答してから送信されます</p></div>`;}
 return `<div class="question" style="${state.submitting?'opacity:.65':''}"><div class="card-head">? <span class="chip">UI確認</span>${state.submitting?'<span style="margin-left:auto;color:var(--dim)">送信中</span>':''}</div><div class="question-text">このUIカタログの表示範囲を選んでください</div><button class="option ${state.selectedOption===0?'selected':''}" data-option="0" aria-pressed="${state.selectedOption===0}" style="width:100%;color:inherit;text-align:left">1. 現在実装済みUI</button><button class="option ${state.selectedOption===1?'selected':''}" data-option="1" aria-pressed="${state.selectedOption===1}" style="width:100%;color:inherit;text-align:left">2. 改善案を含める</button><p class="note">タップで回答します</p></div>`}
function settingsPill(){return state.settings==='normal'?`<span class="chip">${state.provider==='claude'?'Sonnet 4.5 · high':'gpt-5 · high'}</span>`:`<span class="chip" style="color:${state.settings==='error'?'var(--red)':'var(--yellow)'}">${state.settings==='loading'?'モデル読込中…':state.settings==='updating'?'設定を更新中…':'モデル設定エラー'}</span>`}
function agentScreen(){const ag=agents();const long=state.environment==='long';if(state.environment==='agentLoading')return `<div class="screen">${header('エージェント','読み込み中',true,true)}<div class="session-error">読み込み中…</div></div>`;if(state.environment==='agentMissing')return `<div class="screen">${header('エージェント','Agent session',true,true)}<div class="session-error"><div><b>このターミナルのエージェントセッションが見つかりません</b><p>claude / codex を起動すると表示されます。</p><button class="action" id="retryAgent">再試行</button></div></div></div>`;let history=`<div class="bubble user">現在のモバイルUIを確認して</div><div class="activity-line">› 思考 · ツール3件 (Read, Search) · 18秒</div><div class="bubble">現行のAgent画面とSubAgent表示を確認しています。</div>`;if(long)history=Array.from({length:60},(_,i)=>i%3===0?`<div class="bubble user">履歴メッセージ ${i+1}</div>`:i%3===1?`<div class="activity-line">› 思考 · ツール${i+1}件 · ${i+5}秒</div>`:`<div class="bubble">確認結果 ${i+1}: 状態は正常に同期されています。</div>`).join('');return `<div class="screen">${header(state.provider==='claude'?'Claude Code':'Codex',`para-code · main · ${state.provider}`,true,true)}${activityStrip()}<div class="content">${settingsPill()}${history}${webCard()}${interaction()}${!ag.some(a=>['running','idle'].includes(a.status))&&ag.length?`<button class="agent-row" data-nav="activity"><div class="avatar ${state.provider}">A</div><div class="row-main"><b>${ag.length}件のSubAgent activity</b><span>完了した活動を表示</span></div><span>›</span></button>`:''}</div><div class="composer"><div class="composer-box"><span>＋</span><input id="composerInput" aria-label="メッセージ" value="${state.draft.replaceAll('&','&amp;').replaceAll('"','&quot;')}" placeholder="メッセージを入力…" style="flex:1;background:transparent;border:0;color:var(--text);outline:0"><button class="send" id="composerSend" aria-label="送信">${state.submitting?'…':'↑'}</button></div></div></div>`}
function agentRow(a){return `<button class="agent-row" ${a.role==='teammate'?'disabled':''} data-agent="${a.id}"><div class="avatar ${a.provider}">${a.role==='teammate'?'T':'A'}</div><div class="row-main"><b>${a.label}</b><span>${a.provider} · ${a.time}</span></div>${badge(a.status)}${a.role==='teammate'?'':'<span>›</span>'}</button>`}
function taskRow(t){return `<div class="task-row"><span style="color:var(--${t.status==='failed'?'red':t.status==='completed'?'green':'accent'})">${t.status==='completed'?'●':'○'}</span><div class="row-main"><b>${t.label}</b><span>${t.detail}${t.assignee?' · 担当: '+t.assignee:''}</span></div>${badge(t.status)}</div>`}
function activityScreen(){const ag=agents(),ts=tasks();return `<div class="screen">${header('SubAgents & Tasks',`親エージェント配下 · ${state.provider==='claude'?'Claude Code':'Codex'}`)}<div class="content"><div class="overview"><div class="metric"><b>${ag.length}</b><span>SubAgents</span></div><div class="metric"><b>${ts.length}</b><span>Tasks</span></div><div class="metric"><b>${ag.filter(a=>a.status==='running').length}</b><span>Running</span></div></div><div class="section-title">SubAgents</div>${ag.length?ag.map(agentRow).join(''):'<p class="note">検出されたSubAgentはありません</p>'}<div class="section-title">Tasks</div>${ts.length?ts.map(taskRow).join(''):'<p class="note">Task API / hook由来のTaskはありません</p>'}</div></div>`}
function detailScreen(){if(state.environment==='sessionChanged')return `<div class="screen">${header('SubAgent detail',`子Agent専用ビュー · ${state.provider}`)}<div class="session-error"><div><div style="font-size:28px;color:var(--yellow)">!</div><b>親セッションが切り替わりました</b><p>親エージェントへ戻り、新しいセッションから開き直してください。</p></div></div></div>`;if(state.environment==='detailLoading'||state.environment==='detailError')return `<div class="screen">${header('SubAgent detail',`子Agent専用ビュー · ${state.provider}`)}<div class="session-error"><div>${state.environment==='detailLoading'?'SubAgent transcriptを読み込み中…':'<b style="color:var(--red)">SubAgent transcriptを取得できませんでした</b>'}</div></div></div>`;const a=agents()[0]||{id:state.provider==='claude'?'a1':'thread-7b2',label:state.provider==='claude'?'Explore':'UI implementation review',provider:state.provider,status:'completed',detail:'モバイルAgent UIの既存実装を調査する',time:'1分24秒'};const empty=state.activity==='none';const messageSet=`<div class="message"><div class="role">User</div><p>既存のモバイル実装を詳しく調査してください。</p></div><div class="message"><div class="role">SubAgent</div><p>関連コンポーネントと状態管理を確認します。</p></div><div class="message tool"><div class="role">Tool</div><p>rg -n "AgentActivity" app/mobile</p></div><div class="message"><div class="role">SubAgent</div><p>親画面、一覧画面、詳細画面の階層は明確に分離されています。</p></div>`;return `<div class="screen">${header(a.label,`親: ${state.provider==='claude'?'Claude Code':'Codex'} · 子Agent専用ビュー · ${a.provider}`)}<div class="content"><div class="meta"><div class="meta-label">Prompt / Description</div><div class="meta-value">${a.detail}</div><div class="meta-label">Agent ID</div><div class="code">${a.id}</div><div class="meta-label">状態</div><div class="meta-value">${labels[a.status]} · ${a.time}</div><div class="meta-label">担当Task</div>${tasks().slice(0,1).map(taskRow).join('')}<div class="section-title">会話・ツール履歴</div></div>${empty?'<div class="session-error" style="min-height:180px">保存済みの子セッション履歴はありません</div>':state.environment==='long'?messageSet.repeat(40):messageSet}</div></div>`}
function gate(){const connecting=state.environment==='connecting',unpaired=state.environment==='unpaired',pairing=state.environment==='pairing';if(pairing)return `<div class="screen">${header('PCとペアリング','QRコードを読み取ります')}<div class="gate"><div><div class="cloud">▦</div><h2>ペアリング</h2><p>PC側の「モバイルデバイスを接続」で表示されたQRコードを読み取ってください。</p><button id="gateBack">キャンセル</button></div></div></div>`;return `<div class="gate"><button class="gate-back" id="gateBack">‹ 戻る</button><div><div class="cloud">${connecting?'◌':unpaired?'▦':'☁︎'}</div><h2>${connecting?'接続中':unpaired?'ペアリングが必要です':'未接続'}</h2><p>${connecting?'PCに接続しています…':unpaired?'PCとペアリングすると、離れた場所からでも遠隔操作できます。':'PCがオフラインです。PCの Para Code が起動しているか確認してください。'}</p>${!connecting?`<button id="gateAction">${unpaired?'ペアリングを開始':'再接続'}</button>`:''}</div></div>`}
function render(){const root=document.getElementById('phone');root.innerHTML=['offline','connecting','unpaired','pairing'].includes(state.environment)?gate():state.screen==='activity'?activityScreen():state.screen==='detail'?detailScreen():agentScreen();document.querySelectorAll('[data-control]').forEach(group=>group.querySelectorAll('button').forEach(button=>{const control=group.dataset.control;const active=control==='web'&&button.dataset.value==='expanded'?state.webExpanded:control==='web'&&button.dataset.value==='complete'?state.web==='done':control==='interaction'&&button.dataset.value==='submitting'?state.interactionSubmitting:state[control]===button.dataset.value;button.classList.toggle('active',active);button.setAttribute('aria-pressed',String(active))}));renderSentMessages();bindPhone();bindComposerIsolation()}
function renderSentMessages(){if(state.screen!=='agent'||['offline','connecting','unpaired','pairing'].includes(state.environment))return;const content=document.querySelector('.content');state.sentMessages.forEach(message=>content?.insertAdjacentHTML('beforeend',`<div class="bubble user">${message.replaceAll('<','&lt;')}</div>`))}
function bindPhone(){document.querySelectorAll('[data-nav="activity"]').forEach(el=>el.onclick=()=>{state.screen='activity';render()});document.querySelectorAll('[data-nav="back"]').forEach(el=>el.onclick=()=>{state.screen=state.screen==='detail'?'activity':'agent';render()});document.querySelectorAll('[data-agent]').forEach(el=>el.onclick=()=>{state.screen='detail';render()});document.querySelectorAll('[data-step]').forEach(el=>el.onclick=()=>{state.questionStep=Number(el.dataset.step);render()});document.querySelectorAll('[data-option]').forEach(el=>el.onclick=()=>{const value=Number(el.dataset.option);if(state.interaction==='questionGroup')state.groupAnswers[state.questionStep]=value;else state.selectedOption=value;render()});const submit=document.getElementById('questionSubmit');if(submit)submit.onclick=()=>{state.interactionSubmitting=true;render()};const web=document.getElementById('webToggle');if(web)web.onclick=()=>{state.webExpanded=!state.webExpanded;render()};const consent=document.getElementById('favConsent');if(consent)consent.onclick=()=>{state.remoteFavicons=true;render()};const back=document.getElementById('gateBack');if(back)back.onclick=()=>{state.environment='normal';state.screen='agent';render()};const gateAction=document.getElementById('gateAction');if(gateAction)gateAction.onclick=()=>{if(state.environment==='unpaired'){state.environment='pairing';render();return}state.environment='connecting';render();setTimeout(()=>{state.environment='normal';render()},700)};const retry=document.getElementById('retryAgent');if(retry)retry.onclick=()=>{state.environment='agentLoading';render();setTimeout(()=>{state.environment='normal';render()},700)};document.querySelectorAll('.allow,.deny').forEach(el=>el.onclick=()=>{state.interactionSubmitting=true;render()})}
function bindComposerIsolation(){const input=document.getElementById('composerInput'),send=document.getElementById('composerSend');if(!input||!send)return;send.textContent=state.composerSubmitting?'…':'↑';input.oninput=event=>{state.draft=event.target.value};send.onclick=()=>{if(!state.draft.trim()||state.composerSubmitting)return;const message=state.draft,generation=composerGeneration;state.draft='';state.composerSubmitting=true;render();setTimeout(()=>{if(generation!==composerGeneration)return;state.sentMessages.push(message);state.composerSubmitting=false;render()},500)}}
document.querySelectorAll('[data-control]').forEach(group=>group.querySelectorAll('button').forEach(button=>button.onclick=()=>{const control=group.dataset.control;if(control==='web'){state.remoteFavicons=false;if(button.dataset.value==='expanded'){state.webExpanded=true;if(state.web==='none')state.web='domains'}else{state.web=button.dataset.value;state.webExpanded=false}}else if(control==='interaction'&&button.dataset.value==='submitting'){state.interaction='question';state.submitting=true}else{state[control]=button.dataset.value;if(control==='interaction')state.submitting=false}render()}));
document.querySelector('[data-control="web"] [data-value="complete"]').onclick=()=>{state.web='done';state.webExpanded=false;state.remoteFavicons=false;render()};
function applyPreset(preset){composerGeneration++;Object.assign(state,initialState,{...preset,groupAnswers:[0,0],sentMessages:[],draft:''});render()}document.querySelectorAll('[data-preset]').forEach(button=>button.onclick=()=>applyPreset(presets[button.dataset.preset]));document.getElementById('reset').onclick=()=>applyPreset(initialState);
function gallery(){const entries=[['claudeParallel','Claude · 並列SubAgent'],['codexWeb','Codex · Web Search'],['childDetail','SubAgent詳細'],['questions','複数質問'],['offline','切断'],['failed','失敗状態']];document.getElementById('galleryGrid').innerHTML=entries.map(([key,title])=>`<button class="mini" data-gallery-preset="${key}"><h3>${title}</h3><div class="mini-phone">${key==='offline'?'<div class="session-error"><b>未接続</b></div>':key==='questions'?'<div class="question"><b>複数の質問</b><div class="option selected">現行実装のみ</div></div>':`<div class="agent-row"><div class="avatar ${presets[key].provider}">A</div><div class="row-main"><b>${title}</b><span>${presets[key].provider}</span></div></div><div class="web"><div class="eyebrow">${key==='codexWeb'?'3サイトを参照':'Activity'}</div></div>`}</div></button>`).join('');document.querySelectorAll('[data-gallery-preset]').forEach(el=>el.onclick=()=>{applyPreset(presets[el.dataset.galleryPreset]);closeGallery()})}
let galleryTrigger;document.getElementById('galleryOpen').onclick=event=>{galleryTrigger=event.currentTarget;gallery();document.getElementById('gallery').classList.add('show');document.getElementById('galleryClose').focus()};function closeGallery(){document.getElementById('gallery').classList.remove('show');galleryTrigger?.focus()}document.getElementById('galleryClose').onclick=closeGallery;document.addEventListener('keydown',event=>{const modal=document.getElementById('gallery');if(event.key==='Escape'&&modal.classList.contains('show'))closeGallery();if(event.key==='Tab'&&modal.classList.contains('show')){const items=[...modal.querySelectorAll('button:not([disabled])')];const first=items[0],last=items.at(-1);if(event.shiftKey&&document.activeElement===first){event.preventDefault();last.focus()}else if(!event.shiftKey&&document.activeElement===last){event.preventDefault();first.focus()}}});render();
</script>
</body>
</html>
