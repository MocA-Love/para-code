# PARA-CODE: fork-owned workflow (Para Code) — not present in upstream microsoft/vscode. See CLAUDE.md.
#
# Builds signed (macOS) / unsigned (Windows, phase 1 — see NOTES.md) / unsigned
# (Linux) release packages for Para Code and publishes them:
#   1. Build artifacts upload to Cloudflare R2 (not GitHub Releases — this repo
#      is private and browser_download_url requires auth we don't want to give
#      end-user machines).
#   2. Release metadata (version/commit/url/sha256hash) is written to the
#      RELEASES KV namespace consumed by cloudflare/update-server, which is
#      what src/vs/platform/update/electron-main/*.ts polls.
#
# Required secrets (none of these exist yet — see NOTES.md release-infra
# section for the Cloudflare-side setup checklist):
#   APPLE_CERTIFICATE_P12_BASE64, APPLE_CERTIFICATE_PASSWORD,
#     APPLE_CODESIGN_IDENTITY, APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD,
#     APPLE_TEAM_ID                        — macOS signing + notarization
#   CF_API_TOKEN, CF_ACCOUNT_ID            — wrangler r2/kv access (CI, not OAuth)
#   CF_R2_BUCKET                            — R2 bucket name for artifacts
#   CF_KV_NAMESPACE_ID                      — RELEASES KV namespace id
#   PARA_UPDATE_ACCESS_CLIENT_ID/_SECRET    — stamped into product.json by
#     build/gulpfile.vscode.ts so the client sends Cloudflare Access service
#     token headers (see abstractUpdateService.ts getUpdateAccessHeaders)
#
# Windows code signing is intentionally deferred (unsigned builds ship first,
# see NOTES.md) — Azure Trusted Signing wiring is a follow-up phase.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      platforms:
        description: 'Comma-separated subset to build for debugging (darwin,win32,linux). Empty = all + publish.'
        required: false
        default: ''

env:
  PARA_UPDATE_ACCESS_CLIENT_ID: ${{ secrets.PARA_UPDATE_ACCESS_CLIENT_ID }}
  PARA_UPDATE_ACCESS_CLIENT_SECRET: ${{ secrets.PARA_UPDATE_ACCESS_CLIENT_SECRET }}

jobs:
  build-darwin:
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.platforms == '' || contains(github.event.inputs.platforms, 'darwin') }}
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, arm64]
    runs-on: macos-14
    env:
      NPM_ARCH: ${{ matrix.arch }}
      VSCODE_ARCH: ${{ matrix.arch }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        run: |
          set -e
          for i in {1..5}; do
            npm ci && break
            if [ $i -eq 5 ]; then
              echo "Npm install failed too many times" >&2
              exit 1
            fi
            echo "Npm install failed $i, trying again..."
          done
        env:
          npm_config_arch: ${{ env.NPM_ARCH }}
          ELECTRON_SKIP_BINARY_DOWNLOAD: 1
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download built-in extensions
        run: node build/lib/builtInExtensions.ts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Fail fast if the copilot extension postinstall didn't materialize the SDK
      # payload — packaging would otherwise die much later in
      # prepareBuiltInCopilotRipgrepShim with less context (seen once on arm64,
      # run 28631291130; source tree was proven identical to the passing x64 job,
      # so instrument rather than guess).
      - name: Verify copilot SDK layout
        run: |
          if [ ! -f "extensions/copilot/node_modules/@github/copilot/sdk/index.d.ts" ] && [ ! -d "extensions/copilot/node_modules/@github/copilot/sdk" ]; then
            echo "::error::@github/copilot SDK was not materialized by the extension postinstall"
            ls -la extensions/copilot/node_modules/@github/ 2>/dev/null || echo "(no @github dir in extension node_modules)"
            ls -la node_modules/@github/ 2>/dev/null || echo "(no @github dir in root node_modules)"
            exit 1
          fi
          echo "SDK OK:"
          ls extensions/copilot/node_modules/@github/copilot/sdk | head

      - name: Package (vscode-darwin-${{ matrix.arch }}-min)
        run: npm run gulp "vscode-darwin-${{ matrix.arch }}-min"

      - name: Packaging failure diagnostics
        if: failure()
        run: |
          echo "--- source extension @github ---"
          ls -la extensions/copilot/node_modules/@github/ 2>/dev/null || echo missing
          echo "--- .build/extensions/copilot @github ---"
          ls -la .build/extensions/copilot/node_modules/@github/ 2>/dev/null || echo missing
          ls .build/extensions/copilot/node_modules/@github/copilot/ 2>/dev/null | head -40 || true
          echo "--- packaged app extension @github ---"
          APP_DIR="$(dirname "$GITHUB_WORKSPACE")/VSCode-darwin-${{ matrix.arch }}"
          ls "$APP_DIR/$(node -p "require('./product.json').nameLong").app/Contents/Resources/app/extensions/copilot/node_modules/@github/" 2>/dev/null || echo missing
          echo "--- disk space ---"
          df -h . || true

      - name: Import signing certificate
        env:
          CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          set -e
          echo "$CERTIFICATE_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security create-keychain -p "" "$RUNNER_TEMP/buildagent.keychain"
          security default-keychain -s "$RUNNER_TEMP/buildagent.keychain"
          security unlock-keychain -p "" "$RUNNER_TEMP/buildagent.keychain"
          security import "$RUNNER_TEMP/cert.p12" -k "$RUNNER_TEMP/buildagent.keychain" -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" "$RUNNER_TEMP/buildagent.keychain"
          rm -f "$RUNNER_TEMP/cert.p12"

      - name: Code sign app (build/darwin/sign.ts, reused as-is — see CLAUDE.md)
        env:
          AGENT_TEMPDIRECTORY: ${{ runner.temp }}
          CODESIGN_IDENTITY: ${{ secrets.APPLE_CODESIGN_IDENTITY }}
        run: node build/darwin/sign.ts "$(dirname "$GITHUB_WORKSPACE")"

      - name: Zip signed app
        run: |
          set -e
          cd "$(dirname "$GITHUB_WORKSPACE")/VSCode-darwin-${{ matrix.arch }}"
          ditto -c -k --sequesterRsrc --keepParent "$(node -p "require('${{ github.workspace }}/product.json').nameLong").app" "$GITHUB_WORKSPACE/darwin-${{ matrix.arch }}.zip"

      - name: Notarize + staple
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -e
          xcrun notarytool submit "darwin-${{ matrix.arch }}.zip" \
            --apple-id "$APPLE_ID" --password "$APPLE_APP_SPECIFIC_PASSWORD" --team-id "$APPLE_TEAM_ID" --wait
          APP_DIR="$(dirname "$GITHUB_WORKSPACE")/VSCode-darwin-${{ matrix.arch }}"
          xcrun stapler staple "$APP_DIR/$(node -p "require('./product.json').nameLong").app"
          # Re-zip so the shipped artifact carries the stapled ticket.
          cd "$APP_DIR"
          ditto -c -k --sequesterRsrc --keepParent "$(node -p "require('${{ github.workspace }}/product.json').nameLong").app" "$GITHUB_WORKSPACE/darwin-${{ matrix.arch }}.zip"

      - name: Compute sha256
        run: shasum -a 256 "darwin-${{ matrix.arch }}.zip" | cut -d' ' -f1 > "darwin-${{ matrix.arch }}.zip.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: darwin-${{ matrix.arch }}
          path: |
            darwin-${{ matrix.arch }}.zip
            darwin-${{ matrix.arch }}.zip.sha256
          retention-days: 7

  build-win32:
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.platforms == '' || contains(github.event.inputs.platforms, 'win32') }}
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, arm64]
    # windows-latest switched to the VS 2026 image in June 2026, which
    # build/npm/preinstall.ts's toolchain check (VS 2022/2019 only) rejects.
    # windows-2022 is GitHub's documented label for staying on VS 2022.
    runs-on: windows-2022
    env:
      NPM_ARCH: ${{ matrix.arch }}
      VSCODE_ARCH: ${{ matrix.arch }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        run: npm ci
        env:
          npm_config_arch: ${{ env.NPM_ARCH }}
          ELECTRON_SKIP_BINARY_DOWNLOAD: 1
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download built-in extensions
        run: node build/lib/builtInExtensions.ts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package (vscode-win32-${{ matrix.arch }}-min)
        run: npm run gulp "vscode-win32-${{ matrix.arch }}-min"

      - name: Build Inno Setup updater helper + user installer
        run: |
          npm run gulp "vscode-win32-${{ matrix.arch }}-inno-updater"
          npm run gulp "vscode-win32-${{ matrix.arch }}-user-setup"

      # NOTE: unsigned on purpose for the first release phase (see NOTES.md).
      # SmartScreen will warn on first run and some AV heuristics may flag the
      # background updater; Azure Trusted Signing is a planned follow-up once
      # regional eligibility is confirmed.

      - name: Compute sha256
        shell: pwsh
        run: |
          # buildWin32Setup (build/gulpfile.vscode.win32.ts setupDir) writes the
          # installer to .build/win32-<arch>/user-setup/ inside the repo.
          $setup = Get-ChildItem -Path ".build\win32-${{ matrix.arch }}\user-setup\*.exe" | Select-Object -First 1
          Copy-Item $setup.FullName "win32-${{ matrix.arch }}-user-setup.exe"
          (Get-FileHash "win32-${{ matrix.arch }}-user-setup.exe" -Algorithm SHA256).Hash.ToLower() | Out-File -Encoding ascii "win32-${{ matrix.arch }}-user-setup.exe.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: win32-${{ matrix.arch }}
          path: |
            win32-${{ matrix.arch }}-user-setup.exe
            win32-${{ matrix.arch }}-user-setup.exe.sha256
          retention-days: 7

  build-linux:
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.platforms == '' || contains(github.event.inputs.platforms, 'linux') }}
    runs-on: ubuntu-latest
    env:
      VSCODE_ARCH: x64
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Setup system dependencies
        run: |
          set -e
          ./build/azure-pipelines/linux/apt-retry.sh sudo apt-get update
          ./build/azure-pipelines/linux/apt-retry.sh sudo apt-get install -y pkg-config libkrb5-dev libxkbfile-dev libssl-dev rpm

      # GitHub-hosted images no longer ship a Rust toolchain; the tunnel CLI
      # (cli/, cargo bin "code") is required by the .deb: dpkg-shlibdeps in
      # build/linux/dependencies-generator.ts hard-codes bin/<tunnelApplicationName>
      # into its dependency scan. Upstream builds it in a separate pipeline
      # (build/azure-pipelines/cli/cli-compile.yml) and drops it into
      # VSCode-linux-<arch>/bin — replicated inline here.
      - name: Install Rust toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal --default-toolchain stable
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Install dependencies
        run: npm ci
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: 1
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download built-in extensions
        run: node build/lib/builtInExtensions.ts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build tunnel CLI
        run: cargo build --release --bin=code
        working-directory: cli
        env:
          VSCODE_CLI_PRODUCT_JSON: ${{ github.workspace }}/product.json

      - name: Package (vscode-linux-x64-min)
        run: npm run gulp "vscode-linux-x64-min"

      - name: Place tunnel CLI into client build
        run: |
          set -e
          TUNNEL_NAME="$(node -p "require('./product.json').tunnelApplicationName")"
          CLIENT_DIR="$(dirname "$GITHUB_WORKSPACE")/VSCode-linux-x64"
          mkdir -p "$CLIENT_DIR/bin"
          cp cli/target/release/code "$CLIENT_DIR/bin/$TUNNEL_NAME"
          chmod +x "$CLIENT_DIR/bin/$TUNNEL_NAME"
          "$CLIENT_DIR/bin/$TUNNEL_NAME" --version

      - name: Build .deb
        run: |
          npm run gulp "vscode-linux-x64-prepare-deb"
          npm run gulp "vscode-linux-x64-build-deb"

      - name: Compute sha256
        run: |
          set -e
          deb="$(find .build/linux/deb -name '*.deb' | head -n1)"
          cp "$deb" linux-x64.deb
          sha256sum linux-x64.deb | cut -d' ' -f1 > linux-x64.deb.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: |
            linux-x64.deb
            linux-x64.deb.sha256
          retention-days: 7

  publish:
    needs: [build-darwin, build-win32, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write # gh release create/upload (GitHub Release with artifacts)
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Install wrangler
        run: npm install -g wrangler@4

      - name: Resolve version/commit
        id: meta
        run: |
          echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"
          echo "commit=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "timestamp=$(date +%s)" >> "$GITHUB_OUTPUT"

      # Upload each artifact to R2 under an unguessable, commit-scoped path
      # and stamp its KV record. Object upload happens before the KV write so
      # the feed never advertises a URL that isn't live yet (see NOTES.md).
      #
      # Uploads go through R2's S3-compatible API: `wrangler r2 object put` caps
      # uploads at 300 MiB and every artifact exceeds that (seen in run
      # 28654273918). Any Cloudflare API token with R2 Write doubles as S3
      # credentials — access key id = the token's id, secret = SHA-256 of the
      # token value.
      #
      # multipart_threshold is raised above the artifact size (315-336 MB) so
      # each upload is a single PUT: R2's CompleteMultipartUpload intermittently
      # fails with InvalidPart ("parts could not be found") on parallel multipart
      # uploads (seen twice on different files in run 28972859567). Single-part
      # PUT (R2 limit: 5 GiB) sidesteps that code path entirely.
      - name: Publish artifacts to R2 + update feed KV
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          set -e
          export AWS_ACCESS_KEY_ID=$(curl -fsS -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" https://api.cloudflare.com/client/v4/user/tokens/verify | jq -r .result.id)
          export AWS_SECRET_ACCESS_KEY=$(printf '%s' "$CLOUDFLARE_API_TOKEN" | sha256sum | cut -d' ' -f1)
          export AWS_DEFAULT_REGION=auto AWS_REQUEST_CHECKSUM_CALCULATION=when_required AWS_RESPONSE_CHECKSUM_VALIDATION=when_required
          aws configure set default.s3.multipart_threshold 1GB
          EP="https://$CLOUDFLARE_ACCOUNT_ID.r2.cloudflarestorage.com"

          publish() {
            local kv_key="$1" platdir="$2" file="$3" artdir="$4"
            local KEY="stable/$platdir/${{ steps.meta.outputs.commit }}/$file"
            aws s3 cp "artifacts/$artdir/$file" "s3://${{ secrets.CF_R2_BUCKET }}/$KEY" --endpoint-url "$EP" --no-progress
            local HASH=$(tr -d '[:space:]' < "artifacts/$artdir/$file.sha256")
            wrangler kv key put --namespace-id "${{ secrets.CF_KV_NAMESPACE_ID }}" --remote \
              "$kv_key" "{\"commit\":\"${{ steps.meta.outputs.commit }}\",\"version\":\"${{ steps.meta.outputs.version }}\",\"productVersion\":\"${{ steps.meta.outputs.version }}\",\"url\":\"${{ secrets.CF_R2_PUBLIC_BASE_URL }}/$KEY\",\"sha256hash\":\"$HASH\",\"timestamp\":${{ steps.meta.outputs.timestamp }}}"
          }

          publish "stable:darwin"           "darwin-x64"       "darwin-x64.zip"             "darwin-x64"
          publish "stable:darwin-arm64"     "darwin-arm64"     "darwin-arm64.zip"           "darwin-arm64"
          publish "stable:win32-x64-user"   "win32-x64-user"   "win32-x64-user-setup.exe"   "win32-x64"
          publish "stable:win32-arm64-user" "win32-arm64-user" "win32-arm64-user-setup.exe" "win32-arm64"
          publish "stable:linux-x64"        "linux-x64"        "linux-x64.deb"              "linux-x64"

      # Also attach the artifacts to a GitHub Release on the tag, so first-time
      # installs can be downloaded from the Releases page without digging into
      # R2. The auto-updater keeps using R2/KV above (Release asset URLs on a
      # private repo require auth, which end-user machines don't have).
      - name: Create GitHub Release with artifacts
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          TAG="${GITHUB_REF#refs/tags/}"
          mkdir -p release-assets
          cp "artifacts/darwin-x64/darwin-x64.zip"               "release-assets/ParaCode-$TAG-darwin-x64.zip"
          cp "artifacts/darwin-arm64/darwin-arm64.zip"           "release-assets/ParaCode-$TAG-darwin-arm64.zip"
          cp "artifacts/win32-x64/win32-x64-user-setup.exe"      "release-assets/ParaCode-$TAG-win32-x64-setup.exe"
          cp "artifacts/win32-arm64/win32-arm64-user-setup.exe"  "release-assets/ParaCode-$TAG-win32-arm64-setup.exe"
          cp "artifacts/linux-x64/linux-x64.deb"                 "release-assets/ParaCode-$TAG-linux-x64.deb"
          (cd release-assets && sha256sum -- * > "ParaCode-$TAG-SHA256SUMS.txt")
          if ! gh release view "$TAG" --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1; then
            gh release create "$TAG" --repo "$GITHUB_REPOSITORY" --title "$TAG" --generate-notes
          fi
          gh release upload "$TAG" --repo "$GITHUB_REPOSITORY" --clobber release-assets/*
